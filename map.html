<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Leaflet Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    html, body, #map { height: 100%; margin: 0; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

  <script>
    let marker;
    let bridge = null;

    // Initialize map centered on Zagreb
    const initialLat = 45.8150;
    const initialLon = 15.9819;

    const map = L.map('map').setView([initialLat, initialLon], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18
    }).addTo(map);


    marker = L.marker([initialLat, initialLon], { draggable: true }).addTo(map);


    function setMapLocation(lat, lon) {
      marker.setLatLng([lat, lon]);
      map.setView([lat, lon], map.getZoom() || 13);
    }
    window.setMapLocation = setMapLocation; // <-- expose globally


    map.on('click', (e) => {
      marker.setLatLng(e.latlng);
      if (bridge && bridge.sendCoordinates) {
        bridge.sendCoordinates(e.latlng.lat, e.latlng.lng);
      }
    });


    new QWebChannel(qt.webChannelTransport, function(channel) {
      bridge = channel.objects.bridge;


      marker.on('dragend', function() {
        const pos = marker.getLatLng();
        if (bridge && bridge.sendCoordinates) {
          bridge.sendCoordinates(pos.lat, pos.lng);
        }
      });


      if (bridge && bridge.sendCoordinates) {
        bridge.sendCoordinates(initialLat, initialLon);
      }
    });
  </script>
</body>
</html>
